<!DOCTYPE html>
<html lang="en">
<head>
  <title>Taste of Varanasi</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand">Taste of Varanasi</a>
  </div>
</nav>

<div class="bg-warning text-dark text-center p-5">
  <h1 class="fw-bold">Taste of Varanasi</h1>
  <p class="fs-5">Explore & order food from Varanasi’s famous shops</p>

  <a href="shop.html" class="btn btn-dark mt-3 px-4">
    Explore Shops
  </a>
</div>

<div class="container mt-5">
  <h2 class="text-center mb-4 fw-bold">Famous Shops</h2>

  <div class="row">

    <div class="col-md-3 mb-4">
      <div class="card shadow-lg border-0">
        <img src="https://source.unsplash.com/300x200/?kachori" class="card-img-top" style="height:200px;object-fit:cover;">
        <div class="card-body text-center">
          <h5>Kachori Gali</h5>
        </div>
      </div>
    </div>

    <div class="col-md-3 mb-4">
      <div class="card shadow-lg border-0">
        <img src="https://source.unsplash.com/300x200/?lassi" class="card-img-top" style="height:200px;object-fit:cover;">
        <div class="card-body text-center">
          <h5>Blue Lassi</h5>
        </div>
      </div>
    </div>

  </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
  © 2025 Taste of Varanasi
</footer>

</html>
